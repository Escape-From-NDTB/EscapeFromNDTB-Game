name: Lint

on:
  push:
    paths:
      - 'src/Assets/Scripts/**'
      - '.editorconfig'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Check C# formatting, style & analyzers
        run: |
          CSPROJ=src/Lint.csproj
          if [ -f "$CSPROJ" ]; then
            echo "::group::Checking $CSPROJ"
            dotnet format --verify-no-changes --severity error "$CSPROJ"
            echo "::endgroup::"
          else
            echo "::error::$CSPROJ not found"
            exit 1
          fi
