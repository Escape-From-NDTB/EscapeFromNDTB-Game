name: Lint

on:
  push:
    paths:
      - 'src/Assets/Scripts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Check C# formatting, style & analyzers
        run: |
          CSPROJ=$(find src/Assets/Scripts -name '*.csproj' 2>/dev/null | head -1)
          if [ -n "$CSPROJ" ]; then
            echo "Found project: $CSPROJ"
            dotnet format --verify-no-changes "$CSPROJ"
          else
            echo "No .csproj found — skipping format checks."
            echo "Open the project in Unity to generate .csproj files."
          fi
