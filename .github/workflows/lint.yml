name: Lint

on:
  push:
    paths:
      - 'src/Assets/Scripts/**'
      - '.editorconfig'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Check C# formatting, style & analyzers
        run: |
          for CSPROJ in Assembly-CSharp.csproj Assembly-CSharp-Editor.csproj; do
            if [ -f "$CSPROJ" ]; then
              echo "::group::Checking $CSPROJ"
              dotnet format --verify-no-changes --severity error "$CSPROJ"
              echo "::endgroup::"
            else
              echo "⚠ $CSPROJ not found — skipping"
            fi
          done
